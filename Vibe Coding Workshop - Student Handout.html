  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 var(--line-soft); }\n  .ritem:last-child{ margin-bottom:0; padding-bottom:0; border-bottom:none; }\n  .ritem .it{ font-family:'Space Grotesk',sans-serif; font-size:14.5px; font-weight:600; line-height:1.15; }\n  .ritem .iw{ font-size:12px; color:var(--muted); line-height:1.3; margin:3px 0 4px; }\n  .ritem .il{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--ocre-deep); text-decoration:none; display:inline-block; white-space:nowrap; }\n  .ritem .il:hover{ text-decoration:underline; }\n  .pathbox{ margin-top:18px; background:var(--ink); color:var(--paper); border-radius:10px; padding:16px 20px; }\n  .pathbox .pt{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ocre); margin-bottom:10px; }\n  .pathbox ol{ margin:0; padding:0; list-style:none; display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px 16px; counter-reset:p; }\n  .pathbox li{ font-size:13px; line-height:1.35; color:oklch(0.86 0.01 290); counter-increment:p; padding-left:22px; position:relative; }\n  .pathbox li::before{ content:counter(p); position:absolute; left:0; top:0; width:16px; height:16px; border-radius:4px; background:var(--ocre-deep); color:var(--paper); font-family:'JetBrains Mono',monospace; font-size:10px; display:flex; align-items:center; justify-content:center; }\n  .pathbox li b{ color:var(--paper); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- PAGE 1 -->\n  <div class=\"page\">\n    <div class=\"top\">\n      <div>\n        <div class=\"eyebrow\">Exec. Master · Workshop handout<\u002Fdiv>\n        <h1>Vibe coding <span class=\"o\">·<\u002Fspan> Worksheet<\u002Fh1>\n      <\u002Fdiv>\n      <img class=\"logo\" src=\"6bbc4c2a-8289-4111-be1e-8d515534683e\" alt=\"Esade\">\n    <\u002Fdiv>\n\n    <p class=\"obj\">Today you'll turn an idea into two things, without writing a single line of code: a <b>mockup with a mini design system<\u002Fb> (Exercise A) and a <b>working web prototype<\u002Fb> (Exercise B). Follow the steps, tick the boxes, and fill in the prompt templates.<\u002Fp>\n\n    <div class=\"freshbox\">\n      <div class=\"l\">No idea of your own? Use the default case<\u002Fdiv>\n      <div class=\"t\"><b>FreshBox<\u002Fb> — a weekly healthy meal-box service for busy families. Audience: urban couples and families, 30–45. Value: balanced menus, an optimized shopping list, and zero waste. <i>Generic on purpose — make it yours.<\u002Fi><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EXERCISE A -->\n    <div class=\"ex\">\n      <div class=\"ex-head\">\n        <div class=\"badge\">A<\u002Fdiv>\n        <div>\n          <div class=\"nm\">Design the idea<\u002Fdiv>\n          <div class=\"tool\">Claude Design · concept + mockup + mini design system<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"time\">25 min<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"goal\"><b>Goal:<\u002Fb> go from a sentence to a pixel. You're “done” when you can explain <b>why<\u002Fb> you chose each element.<\u002Fp>\n\n      <ul class=\"steps\">\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Write your <b>brief<\u002Fb> using the spec-first pattern (role, context, constraints, format).<\u002Fspan><span class=\"min\">5'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Ask Claude Design for a <b>mockup<\u002Fb> of the main screens.<\u002Fspan><span class=\"min\">10'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Generate a <b>mini design system<\u002Fb>: color palette, typography, base components.<\u002Fspan><span class=\"min\">5'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\"><b>Iterate<\u002Fb> one screen: change the tone, hierarchy, or copy.<\u002Fspan><span class=\"min\">5'<\u002Fspan><\u002Fli>\n      <\u002Ful>\n\n      <div class=\"write\">\n        <div class=\"wl\">Your brief — product / audience / problem / key screens<\u002Fdiv>\n        <div class=\"lines\"><div class=\"ln\"><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tmpl\">\n        <div class=\"tl\"><span class=\"dot\"><\u002Fspan>Design prompt — fill the brackets<\u002Fdiv>\n        <div class=\"code\">You are a product designer. Create the mockup of the main screen of <span class=\"fill\">[PRODUCT]<\u002Fspan>, a <span class=\"fill\">[web/app]<\u002Fspan> for <span class=\"fill\">[AUDIENCE]<\u002Fspan> that solves <span class=\"fill\">[PROBLEM]<\u002Fspan>. Include <span class=\"fill\">[key sections]<\u002Fspan>. Style: <span class=\"fill\">[adjectives]<\u002Fspan>. Also generate a coherent color palette and typography. No lorem ipsum — use realistic copy.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"running\">Vibe coding · EMBDIE · June 2026<\u002Fdiv>\n    <div class=\"pgnum\">1 / 3<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAGE 2 -->\n  <div class=\"page\">\n    <!-- EXERCISE B -->\n    <div class=\"ex\" style=\"margin-top:4px;\">\n      <div class=\"ex-head\">\n        <div class=\"badge b\">B<\u002Fdiv>\n        <div>\n          <div class=\"nm\">Build the prototype<\u002Fdiv>\n          <div class=\"tool\">Claude + Artifacts · a working, navigable web app<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"time\">40 min<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"goal\"><b>Goal:<\u002Fb> a prototype you can demo. You're “done” when it does <b>at least one interactive thing<\u002Fb> — a form, a calculation, or a navigation.<\u002Fp>\n\n      <ul class=\"steps\">\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Describe the app to Claude, <b>reusing the brief<\u002Fb> from Exercise A.<\u002Fspan><span class=\"min\">5'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Generate the <b>Artifact<\u002Fb> and test it in the panel.<\u002Fspan><span class=\"min\">15'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\"><b>Iterate<\u002Fb> 3–4 times: add a section, change a behavior, match your design system.<\u002Fspan><span class=\"min\">15'<\u002Fspan><\u002Fli>\n        <li><span class=\"box\"><\u002Fspan><span class=\"s-tx\">Prepare a <b>60-second pitch<\u002Fb> of your prototype.<\u002Fspan><span class=\"min\">5'<\u002Fspan><\u002Fli>\n      <\u002Ful>\n\n      <div class=\"write\">\n        <div class=\"wl\">Notes — screens, the one interaction, what to iterate next<\u002Fdiv>\n        <div class=\"lines\"><div class=\"ln\"><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tmpl\">\n        <div class=\"tl\"><span class=\"dot\"><\u002Fspan>Build prompt — fill the brackets<\u002Fdiv>\n        <div class=\"code\">Build a working web prototype of <span class=\"fill\">[PRODUCT]<\u002Fspan> for <span class=\"fill\">[AUDIENCE]<\u002Fspan>. It must have: <span class=\"fill\">[screen 1]<\u002Fspan>, <span class=\"fill\">[screen 2]<\u002Fspan>, and <span class=\"fill\">[one concrete interaction — e.g. a booking form or a calculator]<\u002Fspan>. Apply this visual identity: <span class=\"fill\">[palette + typography from Exercise A]<\u002Fspan>. Make it a single file, responsive, with realistic copy.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RISKS -->\n    <div style=\"margin-top:24px;\">\n      <div class=\"sectit\">Keep in mind — 3 key risks<\u002Fdiv>\n      <div class=\"risks\">\n        <div class=\"risk\"><span class=\"sq\"><\u002Fspan><span><b>Hallucination.<\u002Fb> The AI can make things up — verify data and logic before you trust them.<\u002Fspan><\u002Fdiv>\n        <div class=\"risk\"><span class=\"sq\"><\u002Fspan><span><b>Security.<\u002Fb> Never paste credentials, personal data, or secrets into a prompt.<\u002Fspan><\u002Fdiv>\n        <div class=\"risk\"><span class=\"sq\"><\u002Fspan><span><b>Technical debt.<\u002Fb> Gr
